<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>project_S 입력창</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        background: #0f1115;
        color: #f2f4f8;
      }
      .wrap {
        max-width: 680px;
        margin: 0 auto;
        padding: 20px 16px 40px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.25rem;
      }
      .hint {
        margin: 0 0 16px;
        color: #b8c0cc;
        font-size: 0.92rem;
      }
      .card {
        background: #171a21;
        border: 1px solid #2a3140;
        border-radius: 12px;
        padding: 14px;
      }
      label {
        display: block;
        margin: 12px 0 6px;
        font-size: 0.9rem;
      }
      textarea,
      select,
      button {
        width: 100%;
        border-radius: 10px;
        border: 1px solid #364257;
        background: #10141c;
        color: #f2f4f8;
        padding: 10px 12px;
        box-sizing: border-box;
      }
      textarea {
        min-height: 120px;
        resize: vertical;
      }
      button {
        margin-top: 14px;
        font-weight: 600;
        background: #3b82f6;
        border: none;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .button-row {
        display: flex;
        gap: 8px;
      }
      .button-row button {
        margin-top: 8px;
      }
      .ghost {
        background: #263247;
      }
      .result {
        margin-top: 16px;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 0.9rem;
        line-height: 1.45;
      }
      .history {
        margin-top: 12px;
        padding: 10px 12px;
        border: 1px solid #2a3140;
        border-radius: 10px;
        background: #10141c;
      }
      .history h2 {
        margin: 0 0 8px;
        font-size: 0.95rem;
      }
      .history ul {
        margin: 0;
        padding-left: 18px;
      }
      .history li {
        margin: 0 0 6px;
        color: #d2d9e4;
        font-size: 0.86rem;
        line-height: 1.4;
      }
      .meta {
        margin-top: 8px;
        color: #b8c0cc;
        font-size: 0.82rem;
      }
      .ok {
        color: #94f7b4;
      }
      .error {
        color: #ff9c9c;
      }
      .story-preview {
        margin-top: 20px;
      }
      .story-preview h2 {
        margin: 0 0 10px;
        font-size: 1rem;
      }
      .story-preview .row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: stretch;
      }
      .story-preview .row select {
        flex: 1 1 160px;
        min-width: 0;
      }
      .story-preview .row button {
        flex: 0 0 auto;
        width: auto;
        min-width: 88px;
        margin-top: 0;
      }
      #storyPreview {
        margin-top: 10px;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #2a3140;
        background: #10141c;
        max-height: 55vh;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 0.88rem;
        line-height: 1.5;
        color: #e6eaf2;
      }
      #storyPreviewMeta {
        margin-top: 8px;
        font-size: 0.8rem;
        color: #b8c0cc;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>project_S 아이디어 입력</h1>
      <p class="hint">모바일에서 생성·수정 후 저장하면 `content/stories`에 반영됩니다. 아래에서 저장본을 바로 읽을 수 있습니다.</p>

      <section class="card">
        <label for="docType">문서 타입</label>
        <select id="docType">
          <option value="lore">세계관 (lore)</option>
          <option value="scenario">시나리오 (scenario)</option>
        </select>

        <label for="rewriteModeEnabled">
          <input id="rewriteModeEnabled" type="checkbox" />
          rewrite 모드 사용 (#rewrite와 동일)
        </label>

        <label for="message">아이디어</label>
        <textarea
          id="message"
          placeholder="예: 수인이 사는 해빙 행성. 외부인 입국 금지지만 암시장이 활발함."
        ></textarea>

        <button id="submitBtn" type="button">시나리오 생성</button>
        <div class="button-row">
          <button id="reviseBtn" class="ghost" type="button" disabled>수정 요청</button>
          <button id="approveBtn" class="ghost" type="button" disabled>스토리 저장</button>
        </div>

        <label for="revisionMessage">수정 요청 내용</label>
        <textarea
          id="revisionMessage"
          placeholder="예: 2번 장면에서 주인공 감정 반응을 더 직접적으로 써줘."
        ></textarea>

        <section class="history">
          <h2>최근 수정 요청 (최대 10개)</h2>
          <ul id="revisionHistoryList">
            <li>아직 수정 요청이 없습니다.</li>
          </ul>
        </section>

        <div id="draftMeta" class="meta"></div>
        <div id="result" class="result"></div>
      </section>

      <section class="card story-preview">
        <h2>저장된 시나리오 보기</h2>
        <label for="storySelect">파일 선택</label>
        <div class="row">
          <select id="storySelect"></select>
          <button id="refreshStoriesBtn" class="ghost" type="button">목록 새로고침</button>
          <button id="loadStoryBtn" type="button">본문 불러오기</button>
        </div>
        <div id="storyPreviewMeta"></div>
        <div id="storyPreview">목록을 불러온 뒤 파일을 선택하고 본문 불러오기를 누르세요.</div>
      </section>
    </main>

    <script>
      const submitBtn = document.getElementById("submitBtn");
      const messageEl = document.getElementById("message");
      const docTypeEl = document.getElementById("docType");
      const rewriteModeEnabledEl = document.getElementById("rewriteModeEnabled");
      const resultEl = document.getElementById("result");
      const reviseBtn = document.getElementById("reviseBtn");
      const approveBtn = document.getElementById("approveBtn");
      const revisionMessageEl = document.getElementById("revisionMessage");
      const revisionHistoryListEl = document.getElementById("revisionHistoryList");
      const draftMetaEl = document.getElementById("draftMeta");
      const storySelectEl = document.getElementById("storySelect");
      const refreshStoriesBtn = document.getElementById("refreshStoriesBtn");
      const loadStoryBtn = document.getElementById("loadStoryBtn");
      const storyPreviewEl = document.getElementById("storyPreview");
      const storyPreviewMetaEl = document.getElementById("storyPreviewMeta");
      const STORAGE_KEYS = {
        currentDraftId: "projectS.currentDraftId"
      };
      let currentDraftId = null;

      function setResult(text, className) {
        resultEl.className = "result " + className;
        resultEl.textContent = text;
      }

      function saveCurrentDraftId(draftId) {
        if (!draftId) {
          localStorage.removeItem(STORAGE_KEYS.currentDraftId);
          return;
        }
        localStorage.setItem(STORAGE_KEYS.currentDraftId, draftId);
      }

      function setCurrentDraftId(draftId) {
        currentDraftId = draftId || null;
        saveCurrentDraftId(currentDraftId);
        setActionState(Boolean(currentDraftId));
      }

      function isRewriteModeEnabled() {
        return Boolean(rewriteModeEnabledEl.checked);
      }

      function setRewriteModeEnabled(enabled) {
        rewriteModeEnabledEl.checked = Boolean(enabled);
      }

      function setDraftMetaText(draftId, expiresAt, editMode) {
        if (!draftId) {
          draftMetaEl.textContent = "";
          return;
        }
        const expiryLabel = expiresAt ? `만료 예정: ${new Date(expiresAt).toLocaleString()}` : "만료 예정: 알 수 없음";
        const modeLabel = editMode === "rewrite" ? "rewrite" : "preserve";
        draftMetaEl.textContent = `현재 draftId: ${draftId} | 모드: ${modeLabel} | ${expiryLabel}`;
      }

      function renderRevisionHistory(history) {
        const entries = Array.isArray(history) ? history : [];
        revisionHistoryListEl.textContent = "";
        if (entries.length === 0) {
          const empty = document.createElement("li");
          empty.textContent = "아직 수정 요청이 없습니다.";
          revisionHistoryListEl.appendChild(empty);
          return;
        }
        for (const item of entries.slice(-10).reverse()) {
          const li = document.createElement("li");
          const createdAt = item?.createdAt ? new Date(item.createdAt).toLocaleString() : "시간 미상";
          li.textContent = `[${createdAt}] ${item?.message || ""}`;
          revisionHistoryListEl.appendChild(li);
        }
      }

      function formatReviewerSection(reviewerResults) {
        if (!Array.isArray(reviewerResults) || reviewerResults.length === 0) {
          return ["- 리뷰 결과 없음"];
        }
        const lines = [];
        for (const item of reviewerResults) {
          const confidence = Number.isFinite(item.confidence) ? item.confidence.toFixed(2) : "0.50";
          lines.push(`- ${item.reviewer} (confidence=${confidence})`);
          for (const strength of item.strengths || []) {
            lines.push(`  · 강점: ${strength}`);
          }
          for (const concern of item.concerns || []) {
            lines.push(`  · 우려: ${concern}`);
          }
          if (item.revisionDirection) {
            lines.push(`  · 방향: ${item.revisionDirection}`);
          }
          if (Array.isArray(item.changeLog)) {
            for (const log of item.changeLog) {
              lines.push(`  · 변경: ${log}`);
            }
          }
          lines.push("");
        }
        return lines;
      }

      function storyFileNameFromStoragePath(storagePath) {
        if (!storagePath || typeof storagePath !== "string") {
          return null;
        }
        const parts = storagePath.replace(/\\/g, "/").split("/");
        const name = parts[parts.length - 1];
        return name && name.endsWith(".md") ? name : null;
      }

      /** Safari 등은 HTML에 response.json()을 호출하면 "The string did not match the expected pattern"만 보여 준다. */
      async function readJsonBody(response) {
        const text = await response.text();
        const trimmed = text.trim();
        if (!trimmed) {
          throw new Error("서버 응답이 비어 있습니다.");
        }
        if (trimmed.startsWith("<")) {
          throw new Error(
            "서버가 JSON 대신 HTML을 돌려주었습니다. 예전 프로세스가 떠 있거나 이 경로에 API가 없을 때 흔합니다. 터미널에서 서버를 끈 뒤 프로젝트 루트에서 `npm run dev`로 다시 실행해 주세요."
          );
        }
        try {
          return JSON.parse(text);
        } catch (e) {
          const msg = e instanceof Error ? e.message : String(e);
          throw new Error(`JSON 파싱 실패: ${msg}`);
        }
      }

      async function refreshStoryList() {
        storySelectEl.innerHTML = "";
        try {
          const response = await fetch("/api/stories");
          const data = await readJsonBody(response);
          if (!response.ok) {
            throw new Error(data.error || "목록 로드 실패");
          }
          const stories = Array.isArray(data.stories) ? data.stories : [];
          if (stories.length === 0) {
            const opt = document.createElement("option");
            opt.value = "";
            opt.textContent = "(저장된 시나리오 없음)";
            storySelectEl.appendChild(opt);
            return;
          }
          for (const s of stories) {
            const opt = document.createElement("option");
            opt.value = s.fileName;
            const label = `${s.sectionId} · ${s.fileName}`;
            opt.textContent = label;
            storySelectEl.appendChild(opt);
          }
        } catch (e) {
          storyPreviewMetaEl.textContent = "";
          storyPreviewEl.textContent = `목록 오류: ${e.message}`;
        }
      }

      async function loadSelectedStory() {
        const fileName = storySelectEl.value;
        if (!fileName) {
          storyPreviewMetaEl.textContent = "";
          storyPreviewEl.textContent = "선택된 파일이 없습니다.";
          return;
        }
        storyPreviewEl.textContent = "불러오는 중...";
        storyPreviewMetaEl.textContent = "";
        try {
          const response = await fetch(`/api/stories/${encodeURIComponent(fileName)}`);
          const data = await readJsonBody(response);
          if (!response.ok) {
            throw new Error(data.error || "불러오기 실패");
          }
          const s = data.summary || {};
          storyPreviewMetaEl.textContent = `${s.sectionId || ""} · ${s.fileName || fileName} · ${s.updatedAt || ""}`;
          storyPreviewEl.textContent = data.body || "(본문 없음)";
        } catch (e) {
          storyPreviewMetaEl.textContent = "";
          storyPreviewEl.textContent = `오류: ${e.message}`;
        }
      }

      async function restoreDraftFromStorage() {
        const savedDraftId = localStorage.getItem(STORAGE_KEYS.currentDraftId);
        if (!savedDraftId) {
          setCurrentDraftId(null);
          setDraftMetaText(null, null, null);
          renderRevisionHistory([]);
          return;
        }
        try {
          const response = await fetch(`/api/chat/draft/${encodeURIComponent(savedDraftId)}`);
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "draft 복구 실패");
          }
          setCurrentDraftId(savedDraftId);
          setRewriteModeEnabled(data.editMode === "rewrite");
          setDraftMetaText(savedDraftId, data.expiresAt, data.editMode);
          renderRevisionHistory(data.revisionHistory);
          setResult(
            [
              "저장된 draft를 복구했습니다.",
              `- draftId: ${savedDraftId}`,
              data.editMode ? `- editMode: ${data.editMode}` : "",
              data.expiresAt ? `- expiresAt: ${data.expiresAt}` : ""
            ]
              .filter(Boolean)
              .join("\n"),
            "ok"
          );
        } catch (_error) {
          setCurrentDraftId(null);
          setDraftMetaText(null, null, null);
          renderRevisionHistory([]);
        }
      }

      submitBtn.addEventListener("click", async () => {
        const message = messageEl.value.trim();
        const docType = docTypeEl.value;
        const editMode = isRewriteModeEnabled() ? "rewrite" : "preserve";
        if (!message) {
          setResult("아이디어를 입력해 주세요.", "error");
          return;
        }

        submitBtn.disabled = true;
        setResult("요청 처리 중...", "");

        try {
          const response = await fetch("/api/chat/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message, docType, editMode })
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "요청 실패");
          }
          setCurrentDraftId(data.draftId || null);
          setRewriteModeEnabled(data.editMode === "rewrite");
          setDraftMetaText(data.draftId, data.expiresAt, data.editMode);
          renderRevisionHistory(data.revisionHistory);

          const unavailableNote =
            Array.isArray(data.merged?.usedModels) &&
            data.merged.usedModels.some((v) => String(v).includes("(unavailable)"));

          const summary = [
            "생성 완료 (아직 Markdown 저장 전)",
            `- draftId: ${data.draftId}`,
            `- editMode: ${data.editMode || editMode}`,
            "",
            "내가 요청한 내용:",
            data.request?.originalMessage || message,
            "",
            "각 모델이 리뷰한 내용:",
            ...formatReviewerSection(data.reviewerResults),
            "머지해서 제안된 내용:",
            data.merged?.finalText || data.merged?.suggestionText || "(머지 결과 없음)",
            "",
            "핵심 변경 로그:",
            ...(Array.isArray(data.merged?.changeLogs) && data.merged.changeLogs.length > 0
              ? data.merged.changeLogs.map((item) => `- ${item}`)
              : ["- 변경 로그 없음"]),
            "",
            "[모델 병합 요약]",
            ...(data.merged?.reviewSummary ? [data.merged.reviewSummary] : []),
            ...(unavailableNote
              ? [
                  "",
                  "[참고]",
                  "- 현재 일부/전체 리뷰어가 unavailable 상태입니다. 서버의 Cursor 실행/인증 상태를 확인해 주세요."
                ]
              : [])
          ].join("\n");

          setResult(summary, "ok");
        } catch (error) {
          setResult(`실패: ${error.message}`, "error");
          setActionState(Boolean(currentDraftId));
        } finally {
          submitBtn.disabled = false;
        }
      });

      reviseBtn.addEventListener("click", async () => {
        if (!currentDraftId) {
          setResult("먼저 제안을 생성해 주세요.", "error");
          return;
        }
        const revisionMessage = revisionMessageEl.value.trim();
        const editMode = isRewriteModeEnabled() ? "rewrite" : "preserve";
        if (!revisionMessage) {
          setResult("수정 요청 내용을 입력해 주세요.", "error");
          return;
        }
        reviseBtn.disabled = true;
        setResult("수정 요청 반영 중...", "");
        try {
          const response = await fetch("/api/chat/revise-draft", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ draftId: currentDraftId, revisionMessage, editMode })
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "수정 요청 실패");
          }
          setRewriteModeEnabled(data.editMode === "rewrite");
          setDraftMetaText(currentDraftId, data.expiresAt, data.editMode);
          renderRevisionHistory(data.revisionHistory);
          const summary = [
            `수정 반영 완료 (revisionCount=${data.revisionCount})`,
            `- editMode: ${data.editMode || editMode}`,
            "",
            "내가 요청한 내용:",
            data.request?.originalMessage || "",
            "",
            "각 모델이 리뷰한 내용:",
            ...formatReviewerSection(data.reviewerResults),
            "머지해서 제안된 내용:",
            data.merged?.finalText || data.merged?.suggestionText || "(머지 결과 없음)"
          ].join("\n");
          setResult(summary, "ok");
          revisionMessageEl.value = "";
        } catch (error) {
          if (String(error.message || "").includes("draft not found or expired")) {
            setCurrentDraftId(null);
            setDraftMetaText(null, null, null);
            renderRevisionHistory([]);
          }
          setResult(`실패: ${error.message}`, "error");
        } finally {
          reviseBtn.disabled = false;
        }
      });

      approveBtn.addEventListener("click", async () => {
        if (!currentDraftId) {
          setResult("승인할 draftId가 없습니다.", "error");
          return;
        }
        approveBtn.disabled = true;
        setResult("스토리 저장 중...", "");
        try {
          const response = await fetch("/api/chat/approve", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ draftId: currentDraftId })
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "저장 실패");
          }
          const summary = [
            "저장 완료: 시나리오 파일 반영됨",
            `- storagePath: ${data.storagePath}`,
            `- applyKey: ${data.applyKey}`,
            "",
            "머지해서 제안된 내용:",
            data.mergedReview?.suggestionText || "(머지 결과 없음)"
          ].join("\n");
          setResult(summary, "ok");
          const savedName = storyFileNameFromStoragePath(data.storagePath);
          await refreshStoryList();
          if (savedName) {
            storySelectEl.value = savedName;
            await loadSelectedStory();
          }
          setCurrentDraftId(null);
          setDraftMetaText(null, null, null);
          renderRevisionHistory([]);
          messageEl.value = "";
        } catch (error) {
          if (String(error.message || "").includes("draft not found or expired")) {
            setCurrentDraftId(null);
            setDraftMetaText(null, null, null);
            renderRevisionHistory([]);
          }
          setResult(`실패: ${error.message}`, "error");
        } finally {
          approveBtn.disabled = false;
        }
      });

      refreshStoriesBtn.addEventListener("click", () => refreshStoryList());
      loadStoryBtn.addEventListener("click", () => loadSelectedStory());

      setRewriteModeEnabled(false);
      setActionState(false);
      renderRevisionHistory([]);
      restoreDraftFromStorage();
      refreshStoryList();
    </script>
  </body>
</html>
